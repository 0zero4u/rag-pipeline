[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests (no API keys needed)
    integration: Integration tests (mocked APIs)
    e2e: End-to-end tests (requires API keys)
    slow: Tests that take > 5 seconds
addopts = -v --tb=short
asyncio_mode = auto
